    class="navbar shadow-md"

    <nz-page-header-title>
      <span class="header-title-text">{{ title() }}</span>
      @if (subtitle()) { <span class="header-subtitle">{{ subtitle() }}</span> }

    <nz-page-header-extra>
      <div class="header-nav">
        <a routerLink="/ghid" class="nav-link">Ghid</a>
        <app-auth-buttons [showAdminLink]="true" [showIssuesLink]="true" />
      </div>
    </nz-page-header-extra>
  </nz-page-header>
</nav>
