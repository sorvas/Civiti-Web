<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Civica</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <link
      href="https://fonts.googleapis.com/css2?family=Fira+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
    />
    <!-- Define callbacks before loading Google Maps -->
    <script>
      // Initialize callback
      window.initMap = function() {
        console.log('Google Maps initialized via callback');
        if (window.google && window.google.maps) {
          console.log('Google Maps API loaded successfully');
        }
      };
      
      // Add error handling
      window.gm_authFailure = function() {
        console.error('Google Maps authentication failed. Please check your API key and restrictions.');
      };
    </script>
    <!-- Load Google Maps after callbacks are defined -->
    <script async defer
      src="https://maps.googleapis.com/maps/api/js?key=YOUR_DEVELOPMENT_API_KEY&libraries=places,geocoding&callback=initMap&loading=async">
    </script>
  </head>
  <body>
    <app-root></app-root>
  </body>
</html>
